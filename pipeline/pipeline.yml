name: my-pipeline

schedule: daily
start_date: "2011-01-01"
catchup: false

# Looker Studio Dashboard
# URL: https://lookerstudio.google.com/reporting/07dca53f-9446-40e1-acc3-fdaeaf289ede
# Access: Editor (for peer review and collaboration)
# Connected tables: bike_trips_seasonal, bike_trips_temporal, bike_trips_weather_impact

default_connections:
  gcs: "gcs-default"
  bigquery: "bigquery-default"
  # duckdb: "duckdb-default"
  # snowflake: "snowflake-default"

# notifications:
#   slack:
#     - channel: "#data-alerts"

# retries: 3
# concurrency: 1

assets:
  - name: ingest_data
    type: python
    executable: assets/ingestion/ingest_data.py

  - name: load_to_bigquery
    type: python
    executable: assets/ingestion/load_to_bigquery.py
    dependencies:
      - ingest_data

  - name: stg_bike_trips
    type: sql
    executable: assets/staging/stg_bike_trips.sql
    interval: daily
    dependencies:
      - load_to_bigquery

  - name: bike_trips_seasonal
    type: sql
    executable: assets/reports/bike_trips_seasonal.sql
    interval: daily
    dependencies:
      - stg_bike_trips

  - name: bike_trips_temporal
    type: sql
    executable: assets/reports/bike_trips_temporal.sql
    interval: daily
    dependencies:
      - stg_bike_trips

  - name: bike_trips_weather_impact
    type: sql
    executable: assets/reports/bike_trips_weather_impact.sql
    interval: daily
    dependencies:
      - stg_bike_trips

variables:
  project_id:
    type: string
    default: "data-engineering-2026-484614"
  dataset_id:
    type: string
    default: "sharing_bike_mobility"
